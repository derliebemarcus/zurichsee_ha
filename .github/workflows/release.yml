name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to repair or republish, for example v0.6.1
        required: true
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: publish-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: [self-hosted, linux, X64]
    env:
      PYENV_ROOT: /opt/github/pyenv
      PATH: /opt/github/pyenv/shims:/opt/github/pyenv/bin:/usr/local/bin:/usr/bin:/bin
      PYENV_VERSION: "3.14"

    steps:
      - name: Resolve target tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v.+$ ]]; then
            echo "Tag must start with v, got: $TAG"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check out tagged revision
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.tag }}
      - name: Resolve target commit
        id: target
        shell: bash
        run: |
          echo "commit_sha=$(git rev-list -n 1 "${{ steps.tag.outputs.tag }}")" >> "$GITHUB_OUTPUT"

      - name: Wait for required checks on tagged commit
        uses: actions/github-script@v8
        env:
          TARGET_SHA: ${{ steps.target.outputs.commit_sha }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = process.env.TARGET_SHA;
            const required = ["Tests and Coverage", "Quality Gates", "CodeQL", "Security Gates", "Mutation Testing"];
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const deadline = Date.now() + 20 * 60 * 1000;

            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                event: "push",
                branch: "main",
                per_page: 100,
              });

              const runs = data.workflow_runs.filter(
                (run) => run.head_sha === sha && required.includes(run.name),
              );
              const byName = new Map(runs.map((run) => [run.name, run]));
              const missing = required.filter((name) => !byName.has(name));
              const pending = required.filter((name) => {
                const run = byName.get(name);
                return run && run.status !== "completed";
              });
              const failed = required.filter((name) => {
                const run = byName.get(name);
                return run && run.status === "completed" && run.conclusion !== "success";
              });

              core.info(
                `Waiting for checks on ${sha}: missing=[${missing.join(", ")}] pending=[${pending.join(", ")}] failed=[${failed.join(", ")}]`,
              );

              if (failed.length > 0) {
                core.setFailed(`Required checks failed for ${sha}: ${failed.join(", ")}`);
                return;
              }

              if (missing.length === 0 && pending.length === 0) {
                core.info(`All required checks succeeded for ${sha}.`);
                return;
              }

              if (Date.now() > deadline) {
                core.setFailed(`Timed out waiting for required checks on ${sha}.`);
                return;
              }

              await sleep(15000);
            }

      - name: Verify tag matches manifest version
        shell: bash
        run: |
          VERSION="$(
            python3 -c 'import json, sys; from pathlib import Path; print(str(json.loads(Path(sys.argv[1]).read_text(encoding="utf-8")).get("version", "")).strip())' custom_components/zurichsee_ha/manifest.json
          )"
          TAG="${{ steps.tag.outputs.tag }}"

          if [ "v$VERSION" != "$TAG" ]; then
            echo "Tag $TAG does not match manifest version $VERSION."
            exit 1
          fi

      - name: Extract release notes
        run: |
          python3 tools/extract_release_notes.py custom_components/zurichsee_ha/manifest.json CHANGELOG.md release_notes.md

      - name: Create or update GitHub release
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = "${{ steps.tag.outputs.tag }}";
            const body = fs.readFileSync("release_notes.md", "utf8");

            const isPrerelease = tag.includes("-beta");
            const makeLatest = isPrerelease ? "false" : "true";

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });

              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                tag_name: tag,
                name: `Release ${tag}`,
                body,
                prerelease: isPrerelease,
                make_latest: makeLatest,
              });
              core.info(`Updated release ${tag}.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: `Release ${tag}`,
                body,
                prerelease: isPrerelease,
                make_latest: makeLatest,
              });
              core.info(`Created release ${tag}.`);
            }

      - name: Update floating tags
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          SHA="${{ steps.target.outputs.commit_sha }}"
          if [[ "$TAG" == *"-beta"* ]]; then
            FLOATING_TAG="beta"
          else
            FLOATING_TAG="stable"
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$FLOATING_TAG" "$SHA"
          git push origin -f "refs/tags/$FLOATING_TAG"

name: Publish Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Finalize v0.1.5
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash tools/finalize_v015.sh

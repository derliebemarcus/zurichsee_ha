name: Continuous Integration

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Step 1: Enforce security-mandated pytest version via constraints
          python -m pip install -c constraints.txt pytest
          # Step 2: Install testing plugin WITHOUT dependencies to bypass its strict pytest pin
          python -m pip install --no-deps pytest-homeassistant-custom-component
          # Step 3: Install remaining requirements, respecting constraints and ignoring pytest reinstall
          python -m pip install -r requirements-dev.txt -c constraints.txt --ignore-installed pytest
          # Verify correct version is active
          pytest --version | grep "9.0.3"
      - name: Run Ruff lint
        run: python -m ruff check .
      - name: Run Ruff format check
        run: python -m ruff format --check .
      - name: Run mypy
        run: python -m mypy .
      - name: Check translation consistency
        run: python tools/check_translations.py

  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Step 1: Enforce security-mandated pytest version via constraints
          python -m pip install -c constraints.txt pytest
          # Step 2: Install testing plugin WITHOUT dependencies to bypass its strict pytest pin
          python -m pip install --no-deps pytest-homeassistant-custom-component
          # Step 3: Install remaining requirements, respecting constraints and ignoring pytest reinstall
          python -m pip install -r requirements-dev.txt -c constraints.txt --ignore-installed pytest
          # Verify correct version is active
          pytest --version | grep "9.0.3"
      - name: Run tests with coverage
        run: |
          python -m pytest \
            tests/unit \
            tests/ha \
            --cov=custom_components/zurichsee_ha \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

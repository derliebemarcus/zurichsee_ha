name: Continuous Integration

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo-rules:
    runs-on: [self-hosted, linux, X64]
    env:
      PYENV_ROOT: /opt/python
      PATH: /opt/python/shims:/opt/python/bin:/usr/local/bin:/usr/bin:/bin
      PYENV_VERSION: "3.14"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine commit range
        id: range
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "range=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "range=HEAD^..HEAD" >> "$GITHUB_OUTPUT"
          else
            if git rev-parse --quiet --verify "${{ github.event.before }}^{commit}" > /dev/null; then
              echo "range=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
            else
              echo "range=HEAD^..HEAD" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Validate commit messages
        run: python tools/check_commit_messages.py "${{ steps.range.outputs.range }}"

      - name: Validate release notes
        run: python tools/check_release_notes.py custom_components/zurichsee_ha/manifest.json CHANGELOG.md

  static-analysis:
    runs-on: [self-hosted, linux, X64]
    env:
      PYENV_ROOT: /opt/python
      PATH: /opt/python/shims:/opt/python/bin:/usr/local/bin:/usr/bin:/bin
      PYENV_VERSION: "3.14"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt', 'constraints.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install static-analysis dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-dev.txt -c constraints.txt

      - name: Run Ruff lint
        run: |
          source .venv/bin/activate
          python -m ruff check .

      - name: Run Ruff format check
        run: |
          source .venv/bin/activate
          python -m ruff format --check .

      - name: Run mypy
        run: |
          source .venv/bin/activate
          python -m mypy .

      - name: Check translation consistency
        run: |
          source .venv/bin/activate
          python tools/check_translations.py

  test-coverage:
    runs-on: [self-hosted, linux, X64]
    env:
      PYENV_ROOT: /opt/python
      PATH: /opt/python/shims:/opt/python/bin:/usr/local/bin:/usr/bin:/bin
      PYENV_VERSION: "3.14"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt', 'constraints.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install test dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-dev.txt -c constraints.txt

      - name: Run tests with coverage
        run: |
          source .venv/bin/activate
          python -m pytest \
            tests/unit \
            tests/ha \
            --cov=custom_components/zurichsee_ha \
            --cov-config=.coveragerc \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Enforce coverage floor
        run: |
          source .venv/bin/activate
          python tools/check_coverage_threshold.py coverage.xml 97.1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.xml
          github-token: ${{ secrets.GITHUB_TOKEN }}

  sonarqube:
    runs-on: [self-hosted, linux, X64]
    needs: [test-coverage]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarqube.home.siczb.de
        with:
          args: >
            -Dsonar.projectKey=zurichsee_ha
            -Dsonar.python.version=3.14
            -Dsonar.sources=custom_components/zurichsee_ha
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=coverage.xml

  workflow-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: devops-actions/actionlint@v0.1.11

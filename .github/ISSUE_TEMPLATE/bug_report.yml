name: Bug report
description: Report a problem with the Zürichsee Wetterstationen for Home Assistant integration.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Include Home Assistant version, integration version, auth mode, and relevant logs.
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Integration version
    validations:
      required: true
  - type: dropdown
    id: auth_mode
    attributes:
      label: Authentication mode
      options:
        - OAuth2
        - PAT
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
